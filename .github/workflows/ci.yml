name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.5.0

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  structure:
    name: Verify repo structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ensure required top-level files exist
        run: |
          for f in README.md LICENSE requirements.txt .gitignore; do
            if [ ! -f "$f" ]; then
              echo "Missing required file: $f"
              exit 1
            fi
          done

      - name: Ensure required directories exist
        run: |
          for d in evaluation demo finetune assets; do
            if [ ! -d "$d" ]; then
              echo "Missing required directory: $d"
              exit 1
            fi
          done

  syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Byte-compile all .py files
        run: python -m compileall -q .

  tests:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test deps
        run: pip install pytest pyyaml

      - name: Run pytest
        run: pytest tests/ -q

  lsp-server:
    name: LSP server build + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lsp-server
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: lsp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc strict)
        run: npm run build

      - name: Run vitest
        run: npm test

  rina-cli:
    name: CLI build + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rina-cli
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: rina-cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc strict)
        run: npm run build

      - name: Run vitest
        run: npm test

      - name: Smoke-test the binary
        run: |
          node out/cli.js --version
          node out/cli.js --help | head -1
