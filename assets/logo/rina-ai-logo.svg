<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160" role="img" aria-label="RINA AI logo">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6E56F7"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
  </defs>

  <g transform="translate(20,20)">
    <circle cx="60" cy="60" r="50" fill="none" stroke="url(#ringGrad)" stroke-width="8"/>
    <circle cx="60" cy="60" r="14" fill="url(#ringGrad)"/>
    <line x1="60" y1="10" x2="60" y2="32" stroke="url(#ringGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="60" y1="88" x2="60" y2="110" stroke="url(#ringGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="10" y1="60" x2="32" y2="60" stroke="url(#ringGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="88" y1="60" x2="110" y2="60" stroke="url(#ringGrad)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g transform="translate(160,0)">
    <text x="0" y="90" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="url(#textGrad)" letter-spacing="2">RINA</text>
    <text x="0" y="135" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#6E56F7" letter-spacing="6">AI · CODER</text>
  </g>
</svg>
